name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error title=Invalid release tag::${GITHUB_REF_NAME} is not a valid v-prefixed semantic version."
            exit 1
          fi
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"
          cache: true
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - name: Resolve build metadata
        id: build_metadata
        shell: bash
        run: git show -s --format='date=%cI' "${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/metadata-action@v6
        id: metadata
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
      - uses: docker/build-push-action@v7
        id: image
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.build_metadata.outputs.date }}
      - name: Sign container image
        env:
          DIGEST: ${{ steps.image.outputs.digest }}
        run: cosign sign --yes "ghcr.io/${GITHUB_REPOSITORY}@${DIGEST}"
