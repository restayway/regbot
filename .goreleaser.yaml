version: 2
project_name: regbot
before:
  hooks:
    - go mod tidy
builds:
  - id: regbot
    main: ./cmd/regbot
    binary: regbot
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - >-
        -s -w
        -X github.com/restayway/regbot/internal/cli.Version={{.Version}}
        -X github.com/restayway/regbot/internal/cli.Commit={{.Commit}}
        -X github.com/restayway/regbot/internal/cli.Date={{.Date}}
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
sboms:
  - artifacts: archive
changelog:
  use: github
release:
  prerelease: auto
