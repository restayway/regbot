version: v1
apply: false

registries:
  internal:
    provider: oci
    endpoint: https://registry.example.com
    credentials:
      username_env: REGBOT_REGISTRY_USERNAME
      password_env: REGBOT_REGISTRY_PASSWORD
    timeout: 30s

policies:
  internal-calendar-images:
    targets:
      - registry: internal
        repositories:
          include: ["example-org/*"]
    tags:
      parser: calendar
      patterns:
        - "vYYYY.MM.DD.x"
        - "vYYYY.MM.DD.x-{app}"
    retention:
      keep_newer_than: 168h
      delete_older_than: 720h
      keep_latest: 5
      keep_at_least: 1
      group_by: app
    protect:
      tags: ["latest", "stable", "prod"]
      unparsed_tags: true
    safety:
      max_delete_count: 100
      max_delete_percent: 25
      require_tagged_artifact: true
