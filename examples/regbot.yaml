version: v1
apply: false

registries:
  internal:
    provider: oci
    endpoint: https://registry.restayway.net
    credentials:
      username_env: REGBOT_REGISTRY_USERNAME
      password_env: REGBOT_REGISTRY_PASSWORD
    timeout: 30s

  github:
    provider: github
    owner: restayway
    owner_type: organization
    token_env: GITHUB_TOKEN
    timeout: 30s

policies:
  internal-calendar-images:
    targets:
      - registry: internal
        repositories:
          include: ["restayway/*"]
    tags:
      parser: calendar
      patterns:
        - "vYYYY.MM.DD.x"
        - "vYYYY.MM.DD.x-{app}"
    retention:
      keep_newer_than: 168h
      delete_older_than: 720h
      keep_latest: 5
      keep_at_least: 1
      group_by: app
    protect:
      tags: ["latest", "stable", "prod"]
      unparsed_tags: true
    safety:
      max_delete_count: 100
      max_delete_percent: 25
      require_tagged_artifact: true

  github-calendar-images:
    targets:
      - registry: github
        repositories:
          include: ["*"]
    tags:
      parser: calendar
    retention:
      keep_newer_than: 168h
      delete_older_than: 720h
      keep_latest: 5
      keep_at_least: 1
      group_by: app
    protect:
      tags: ["latest", "stable", "prod"]
      unparsed_tags: true
    safety:
      max_delete_count: 50
      max_delete_percent: 20
      require_tagged_artifact: true

hooks:
  after_apply:
    type: webhook
    url_env: REGBOT_GC_WEBHOOK_URL
    bearer_token_env: REGBOT_GC_WEBHOOK_TOKEN
    hmac_secret_env: REGBOT_GC_HMAC_SECRET
    timeout: 30s
